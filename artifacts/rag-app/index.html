<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!-- Brand mark: superellipse blob in --primary (#0040AB) with a white
         Georgia "T" — matches the TopBar wordmark face. Inline data URI so
         the tab icon needs no network fetch. -->
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Cpath d='M16 2c10 0 14 4 14 14s-4 14-14 14S2 26 2 16 6 2 16 2z' fill='%230040AB'/%3E%3Ctext x='16' y='22' text-anchor='middle' font-family='Georgia, serif' font-size='18' font-weight='600' fill='%23FDFDFC'%3ET%3C/text%3E%3C/svg%3E" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Begin the session probe while the module graph downloads. The app's
         fetch uses the same credential mode, so Chromium reuses this response. -->
    <link rel="preload" href="/api/me" as="fetch" crossorigin="use-credentials" />
    <meta name="theme-color" content="#E8E6DE" />
    <title>Truenote | Cited Knowledge Answers for Customer Service Teams</title>
    <meta name="description" content="Truenote helps customer service teams find fast, source-backed answers from approved policies and procedures, with citations they can verify." />
    <meta name="robots" content="index, follow" />
    <link rel="canonical" href="https://truenote.org/" />

    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="Truenote" />
    <meta property="og:title" content="Truenote | Cited Knowledge Answers for Customer Service Teams" />
    <meta property="og:description" content="Fast, source-backed answers from approved policies and procedures, with citations customer service teams can verify." />
    <meta property="og:url" content="https://truenote.org/" />
    <meta property="og:image" content="https://truenote.org/visuals/luminous-archive.webp" />
    <meta property="og:image:type" content="image/webp" />
    <meta property="og:image:alt" content="The Truenote luminous archive, with layered documents gathering around an evidence core" />

    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Truenote | Cited Knowledge Answers for Customer Service Teams" />
    <meta name="twitter:description" content="Fast, source-backed answers from approved policies and procedures, with citations customer service teams can verify." />
    <meta name="twitter:image" content="https://truenote.org/visuals/luminous-archive.webp" />
    <meta name="twitter:image:alt" content="The Truenote luminous archive, with layered documents gathering around an evidence core" />

    <script type="application/ld+json">
      {
        "@context": "https://schema.org",
        "@type": "WebSite",
        "name": "Truenote",
        "url": "https://truenote.org/",
        "description": "Cited knowledge answers for customer service teams."
      }
    </script>
  </head>
  <body class="min-h-screen bg-background text-foreground antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
