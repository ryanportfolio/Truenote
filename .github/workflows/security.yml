name: Security and quality

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]
  push:
    branches: [main]
  schedule:
    - cron: "17 6 * * 1"
  workflow_dispatch:
    inputs:
      managed_release_gate:
        description: Run the strict vulnerability-management release gate
        required: true
        type: boolean
        default: false
      branch_enforcement_gate:
        description: Validate the current branch-enforcement evidence record
        required: true
        type: boolean
        default: false

permissions:
  contents: read

concurrency:
  group: security-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    name: Typecheck, build, tests
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: Verify pull-request change record
        if: github.event_name == 'pull_request'
        run: corepack pnpm --filter @workspace/scripts run verify:change-record -- --event "$GITHUB_EVENT_PATH" --allow-pending
      - name: Verify PCI evidence integrity
        run: pnpm run verify:pci-evidence
      - name: Verify vulnerability baseline structure
        run: corepack pnpm --filter @workspace/scripts run verify:vulnerabilities
      - name: Verify managed-release vulnerability readiness
        if: github.event_name == 'workflow_dispatch' && inputs.managed_release_gate
        run: corepack pnpm --filter @workspace/scripts run verify:vulnerabilities:release
      - name: Verify branch-enforcement evidence
        if: github.event_name == 'workflow_dispatch' && inputs.branch_enforcement_gate
        run: corepack pnpm --filter @workspace/scripts run verify:branch-enforcement -- docs/compliance/pci/branch-enforcement-evidence-current.json
      - name: Typecheck
        run: pnpm -r run check
      - name: Frontend production build
        run: pnpm --filter @workspace/rag-app run build
      - name: Unit tests
        run: pnpm -r run test

  supply-chain:
    name: Dependency audit and SBOM
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v7
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: pnpm-lock.yaml
      - name: Install locked dependencies
        run: pnpm install --frozen-lockfile
      - name: High-severity production dependency audit
        run: corepack pnpm@11.13.0 --pm-on-fail=ignore audit --prod --audit-level high
      - name: Generate CycloneDX SBOM
        uses: anchore/sbom-action@v0
        with:
          path: .
          format: cyclonedx-json
          artifact-name: truenote-sbom.cdx.json
          upload-artifact-retention: 30

  secrets:
    name: Secret scan
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: read
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
          persist-credentials: false
      - uses: gitleaks/gitleaks-action@v3
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITLEAKS_LICENSE: ${{ secrets.GITLEAKS_LICENSE }}
          GITLEAKS_ENABLE_COMMENTS: "false"

  codeql:
    name: CodeQL analysis and SARIF evidence
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v7
        with:
          persist-credentials: false
      - uses: github/codeql-action/init@v4
        with:
          languages: javascript-typescript
          queries: security-extended
      - id: analyze
        uses: github/codeql-action/analyze@v4
        with:
          category: /language:javascript-typescript
          output: codeql-results
          upload: always
          upload-database: false
      - name: Retain CodeQL SARIF evidence
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: truenote-codeql-sarif
          path: codeql-results
          if-no-files-found: error
          retention-days: 30
